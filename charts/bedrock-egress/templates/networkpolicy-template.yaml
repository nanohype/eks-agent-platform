{{- if .Values.networkPolicy.enabled -}}
# Reference egress contract for tenant-runtime pods, stored as a ConfigMap for
# documentation + auditing. The operator embeds the equivalent policy in Go and
# applies it per tenant namespace at Platform reconcile time — on cilium (the
# default) as a CiliumNetworkPolicy, the only kind that can allow egress to the
# host-entity EKS Pod Identity creds endpoint; on other CNIs as the
# NetworkPolicy shown here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-tenant-networkpolicy-template
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: eks-agent-platform
data:
  networkpolicy.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: tenant-egress
      labels:
        agents.nanohype.dev/tenant: "true"
    spec:
      podSelector: {}
      policyTypes:
        - Egress
      egress:
        # EKS Pod Identity credential endpoint. The agent SDK fetches AWS creds
        # from 169.254.170.23:80; without this rule a Pod Identity association
        # yields no credentials. On cilium this link-local address is the
        # reserved `host` entity (an ipBlock CANNOT match it) — there the
        # operator's CiliumNetworkPolicy uses `toEntities: [host]` on port 80.
        - to:
            - ipBlock:
                cidr: 169.254.170.23/32
          ports:
            - port: 80
              protocol: TCP
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: kube-system
              podSelector:
                matchLabels:
                  k8s-app: kube-dns
          ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: {{ .Values.networkPolicy.agentgatewayNamespace }}
          ports:
            - port: 8080
              protocol: TCP
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: {{ .Values.networkPolicy.observabilityNamespace }}
          ports:
            - port: 4317
              protocol: TCP
            - port: 4318
              protocol: TCP
{{- end }}
