---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: evalsuites.agents.stxkxs.io
spec:
  group: agents.stxkxs.io
  names:
    kind: EvalSuite
    listKind: EvalSuiteList
    plural: evalsuites
    shortNames:
      - eval
    singular: evalsuite
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.agentFleetRef.name
          name: Fleet
          type: string
        - jsonPath: .spec.schedule
          name: Schedule
          type: string
        - jsonPath: .status.lastScore
          name: LastScore
          type: string
        - jsonPath: .status.phase
          name: Phase
          type: string
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: EvalSuite is a scheduled evaluation run against an AgentFleet's
            agents.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: EvalSuiteSpec defines a periodic evaluation run against an
                AgentFleet.
              properties:
                agentFleetRef:
                  description: AgentFleetRef targets the fleet whose agents are under
                    test.
                  properties:
                    name:
                      type: string
                  required:
                    - name
                  type: object
                cases:
                  description: |-
                    Cases is the list of test cases (input prompt + expected criteria).
                    In production these are typically loaded from an S3 manifest; this
                    inline list is for small / dev suites.
                  items:
                    description: EvalCase is a single test case.
                    properties:
                      expectContains:
                        items:
                          type: string
                        type: array
                      input:
                        type: string
                      maxCostUsd:
                        type: string
                      maxLatencyMs:
                        format: int32
                        type: integer
                      name:
                        type: string
                    required:
                      - input
                      - name
                    type: object
                  type: array
                casesFromManifest:
                  description: |-
                    CasesFromManifest loads from `eval-reports/<platform>/manifests/<name>.json`
                    in the eval-reports S3 bucket.
                  type: string
                passThreshold:
                  default: "0.85"
                  description: |-
                    PassThreshold (0..1) is the required mean score for the run to be
                    marked passing. Argo Rollouts AnalysisTemplate consumes this signal.
                    Modeled as a string so reviewers see decimals in `kubectl get -o yaml`
                    without int<->float coercion surprises; pattern enforces 0.0 .. 1.0.
                  pattern: ^(0(\.[0-9]+)?|1(\.0+)?)$
                  type: string
                platformRef:
                  description: LocalRef references a CR by name in the same namespace.
                  properties:
                    name:
                      type: string
                  required:
                    - name
                  type: object
                schedule:
                  description: Schedule (cron) — when to run the suite. Empty = manual
                    only.
                  type: string
              required:
                - agentFleetRef
                - platformRef
              type: object
              x-kubernetes-validations:
                - message: cases and casesFromManifest are mutually exclusive
                  rule: '!(has(self.casesFromManifest) && self.casesFromManifest != ""
                    && has(self.cases) && size(self.cases) > 0)'
            status:
              description: EvalSuiteStatus reports the latest run.
              properties:
                conditions:
                  items:
                    description: Condition contains details for one aspect of the current
                      state of this API Resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                lastReportUrl:
                  description: LastReportURL (s3:// URL to the rendered HTML report).
                  type: string
                lastRunAt:
                  description: LastRunAt timestamp.
                  format: date-time
                  type: string
                lastScore:
                  description: LastScore (mean across cases, 0..1).
                  type: string
                phase:
                  description: "Phase: Pending, Running, Passed, Failed."
                  type: string
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
