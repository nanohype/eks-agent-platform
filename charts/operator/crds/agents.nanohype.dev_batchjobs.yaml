---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: batchjobs.agents.nanohype.dev
spec:
  group: agents.nanohype.dev
  names:
    kind: BatchJob
    listKind: BatchJobList
    plural: batchjobs
    shortNames:
    - batch
    singular: batchjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.platformRef.name
      name: Platform
      type: string
    - jsonPath: .spec.modelId
      name: Model
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.outputLocation
      name: Output
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BatchJob runs a single Amazon Bedrock batch-inference job for
          a Platform tenant.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BatchJobSpec submits an Amazon Bedrock batch-inference job
              (CreateModelInvocationJob): an S3 JSONL of records in, an S3 JSONL of
              results out. One BatchJob maps to exactly one Bedrock job — there is no
              schedule; create a new CR for each run (the reconciler is idempotent on
              the spec, so re-applying the same CR never double-submits).
            properties:
              inputS3Uri:
                description: InputS3Uri is the s3:// URI of the input JSONL (or its
                  prefix).
                pattern: ^s3://.+
                type: string
              modelId:
                description: |-
                  ModelID is the Bedrock model id or inference-profile id the batch job
                  invokes (e.g. "anthropic.claude-3-5-sonnet-20241022-v2:0" or a
                  cross-region "us.anthropic.…" profile). Validated server-side by
                  Bedrock; kept a free string here like Identity.AllowedModels.
                minLength: 1
                type: string
              modelInvocationType:
                default: InvokeModel
                description: |-
                  ModelInvocationType selects the record schema in the input JSONL —
                  raw InvokeModel bodies or Converse turns.
                enum:
                - InvokeModel
                - Converse
                type: string
              outputS3Prefix:
                description: OutputS3Prefix is the s3:// prefix Bedrock writes results
                  under.
                pattern: ^s3://.+
                type: string
              platformRef:
                description: LocalRef references a CR by name in the same namespace.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              serviceRoleArnOverride:
                description: |-
                  ServiceRoleArnOverride replaces the operator-resolved Bedrock batch
                  service role (the role Bedrock assumes to read input / write output).
                  Normally empty — the reconciler injects the SSM-resolved role.
                type: string
              timeoutHours:
                default: 24
                description: TimeoutHours bounds the job's runtime. Bedrock requires
                  24..168.
                format: int32
                maximum: 168
                minimum: 24
                type: integer
            required:
            - inputS3Uri
            - modelId
            - outputS3Prefix
            - platformRef
            type: object
          status:
            description: BatchJobStatus tracks the Bedrock job the reconciler submitted
              and polls.
            properties:
              completedAt:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failedCount:
                format: int64
                type: integer
              jobArn:
                description: |-
                  JobArn is the submitted job's ARN. Non-empty is the idempotency guard:
                  once set, the reconciler polls rather than re-submitting.
                type: string
              jobName:
                description: JobName is the deterministic, Bedrock-sanitized job name.
                type: string
              message:
                description: Message carries the last Bedrock status / failure reason.
                type: string
              outputLocation:
                description: OutputLocation is the s3:// URI Bedrock reports for the
                  results.
                type: string
              phase:
                description: 'Phase: Pending, Provisioning, Running, Succeeded, Failed,
                  Stopped.'
                type: string
              recordCount:
                description: |-
                  RecordCount / SucceededCount / FailedCount mirror Bedrock's
                  ProcessedRecordCount / SuccessRecordCount / ErrorRecordCount once the
                  job is running or terminal.
                format: int64
                type: integer
              submittedAt:
                description: SubmittedAt / CompletedAt timestamps.
                format: date-time
                type: string
              succeededCount:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
