---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: modelgateways.agents.nanohype.dev
spec:
  group: agents.nanohype.dev
  names:
    kind: ModelGateway
    listKind: ModelGatewayList
    plural: modelgateways
    shortNames:
    - mgw
    singular: modelgateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.platformRef.name
      name: Platform
      type: string
    - jsonPath: .status.endpoint
      name: Endpoint
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelGateway is a per-Platform gateway CR that fronts Bedrock
          for one or more named routes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelGatewaySpec configures a per-Platform gateway: the routes exposed,
              which Bedrock models back them, and which Guardrail attaches.
            properties:
              defaultGuardrailRef:
                description: DefaultGuardrailRef applies when a Route does not specify
                  its own.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              platformRef:
                description: PlatformRef is the owning Platform.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              routes:
                description: Routes is the list of named routes the gateway exposes.
                items:
                  description: ModelRouteSpec is a single named route.
                  properties:
                    crossRegionProfile:
                      description: |-
                        CrossRegionProfile enables a Bedrock cross-region inference profile.
                        Foundation routes only; rejected on an imported route.
                      type: string
                    guardrailRef:
                      description: |-
                        GuardrailRef overrides the gateway's default guardrail. On a foundation
                        route the guardrail attaches inline to the Bedrock backend. On an imported
                        route an inline guardrail is not applicable (Bedrock inline guardrails are
                        foundation-model-only), so the route is served without one and the gateway
                        surfaces an ImportedRouteGuardrailUnenforced condition — enforcement via
                        ApplyGuardrail is a tracked follow-up.
                      properties:
                        name:
                          type: string
                      required:
                      - name
                      type: object
                    modelFamily:
                      description: |-
                        ModelFamily is the Bedrock model family for a foundation route:
                        anthropic | meta | mistral | cohere | amazon-titan | amazon-nova |
                        stability. Required for a foundation route, rejected for an imported one
                        (enforced by the route-level CEL rules above).
                      enum:
                      - anthropic
                      - meta
                      - mistral
                      - cohere
                      - amazon-titan
                      - amazon-nova
                      - stability
                      type: string
                    modelId:
                      description: |-
                        ModelID is the route's model. For a foundation route it is the canonical
                        Bedrock model ID or inference-profile ID; for an imported route it is the
                        imported-model ARN
                        (arn:<partition>:bedrock:<region>:<account>:imported-model/<id>).
                      type: string
                    modelSource:
                      default: foundation
                      description: |-
                        ModelSource discriminates a foundation-model route from an imported
                        (Custom Model Import) route. Defaults to foundation, so an existing
                        route that omits it stays a foundation route.
                      enum:
                      - foundation
                      - imported
                      type: string
                    name:
                      type: string
                    rateLimit:
                      description: |-
                        RateLimit caps requests per minute (not tokens) on this route. The
                        operator renders it into an agentgateway local rate-limit policy with
                        unit=Minutes; 0 or unset disables rate limiting for the route.
                      format: int32
                      type: integer
                  required:
                  - modelId
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: modelFamily is required for a foundation route
                    rule: self.modelSource != 'foundation' || has(self.modelFamily)
                  - message: modelFamily does not apply to an imported route and must
                      be omitted
                    rule: self.modelSource != 'imported' || !has(self.modelFamily)
                  - message: crossRegionProfile does not apply to an imported route
                      and must be omitted
                    rule: self.modelSource != 'imported' || !has(self.crossRegionProfile)
                  - message: an imported route's modelId must be the imported-model
                      ARN
                    rule: self.modelSource != 'imported' || self.modelId.startsWith('arn:')
                minItems: 1
                type: array
            required:
            - platformRef
            - routes
            type: object
          status:
            description: ModelGatewayStatus surfaces the agentgateway Route/Listener
              state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoint:
                description: Endpoint is the cluster-internal hostname of the gateway.
                type: string
              observedGeneration:
                description: ObservedGeneration is the last spec.generation reconciled.
                format: int64
                type: integer
              phase:
                description: 'Phase: Pending, Provisioning, Ready, Failed.'
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
