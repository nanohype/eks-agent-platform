apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.fullname" . }}-manager
  labels: {{- include "operator.labels" . | nindent 4 }}
rules:
  # NOT generated — this list is maintained BY HAND and must be kept a superset of
  # operators/config/rbac/role.yaml, which controller-gen DOES generate from the
  # kubebuilder markers. It previously claimed to be generated and was not, and it
  # had silently drifted: the markers on platform_controller.go declared
  #
  #   +kubebuilder:rbac:groups="",resources=users,verbs=impersonate
  #   +kubebuilder:rbac:groups=rbac.authorization.k8s.io,resources=clusterroles;clusterrolebindings,...
  #
  # and this chart shipped neither. The operator could not create the impersonation
  # RBAC its Platform controller exists to create, its ClusterRole informer failed to
  # sync, and every Platform hung in phase=Provisioning. Both rules are restored at
  # the bottom of this list.
  #
  # If you add a kubebuilder rbac marker, add it here too.
  - apiGroups: ["platform.nanohype.dev"]
    resources: ["tenants", "platforms"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.nanohype.dev"]
    resources: ["tenants/status", "platforms/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["platform.nanohype.dev"]
    resources: ["platforms/finalizers"]
    verbs: ["update"]
  - apiGroups: ["agents.nanohype.dev"]
    resources: ["modelgateways", "agentfleets", "batchjobs", "sandboxpools", "agentsandboxes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.nanohype.dev"]
    resources: ["modelgateways/status", "agentfleets/status", "batchjobs/status", "sandboxpools/status", "agentsandboxes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.nanohype.dev"]
    resources: ["agentfleets/finalizers", "modelgateways/finalizers", "batchjobs/finalizers", "sandboxpools/finalizers", "agentsandboxes/finalizers"]
    verbs: ["update"]
  - apiGroups: ["governance.nanohype.dev"]
    resources: ["budgetpolicies", "evalsuites"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["governance.nanohype.dev"]
    resources: ["budgetpolicies/status", "evalsuites/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["governance.nanohype.dev"]
    resources: ["evalsuites/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "limitranges", "events", "configmaps", "serviceaccounts", "services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets: read-only cluster-wide (so the operator can inspect existing
  # tool-credential Secrets); ExternalSecretOperator owns secret writes
  # into tenant namespaces. The operator never mutates Secret data
  # directly — tenant credential plumbing flows through ESO.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CiliumNetworkPolicy for tenant/fleet egress (networkPolicy.engine: cilium) —
  # the only policy that can allow egress to the host-entity Pod Identity creds
  # endpoint. Tolerated-absent in code, but the verb set must be granted.
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["appprojects", "applications", "workflows", "workflowtemplates", "cronworkflows", "analysisruns", "analysistemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kagent.dev"]
    resources: ["agents", "modelconfigs", "toolservers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentgateway.dev"]
    resources: ["agentgatewaybackends", "agentgatewaypolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects", "triggerauthentications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaimtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ── Attribution (Platform.spec.attribution) ──────────────────────────────────
  #
  # The Platform controller provisions the apiserver half of attribution: a
  # ClusterRole granting `impersonate` on exactly the Platform's named operators,
  # bound to the tenant-runtime ServiceAccount. A session kubeconfig then
  # authenticates as that SA while impersonating the operator, so the apiserver
  # audit log records impersonatedUser=<operator> — an agent's actions carry a
  # NAMED HUMAN instead of an anonymous ServiceAccount.
  #
  # Kubernetes escalation-prevention means the operator can only create a role
  # granting `impersonate` if it already holds `impersonate` itself. It does, below.
  # That is deliberately how this is done rather than granting the operator the
  # `escalate` verb, which would let it mint a ClusterRole carrying ANY permission —
  # a blank cheque. Holding `impersonate` lets it grant only a SUBSET of what it
  # holds, and the controller only ever writes resourceNames=<the named operators>,
  # never `impersonate *`. Binding needs no `bind` verb for the same reason: the
  # operator holds a superset of the role it binds.
  - apiGroups: [""]
    resources: ["users"]
    verbs: ["impersonate"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "operator.fullname" . }}-manager
  labels: {{- include "operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
