apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.fullname" . }}-manager
  labels: {{- include "operator.labels" . | nindent 4 }}
rules:
  # Generated by controller-gen from kubebuilder markers — replaced at
  # `make manifests` time. The list below is the union for chart packaging.
  - apiGroups: ["agents.stxkxs.io"]
    resources: ["tenants", "platforms", "modelgateways", "agentfleets", "budgetpolicies", "evalsuites", "sandboxpools", "agentsandboxes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agents.stxkxs.io"]
    resources: ["tenants/status", "platforms/status", "modelgateways/status", "agentfleets/status", "budgetpolicies/status", "evalsuites/status", "sandboxpools/status", "agentsandboxes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.stxkxs.io"]
    resources: ["platforms/finalizers", "agentfleets/finalizers", "sandboxpools/finalizers", "agentsandboxes/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "limitranges", "events", "configmaps", "serviceaccounts", "services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets: read-only cluster-wide (so the operator can inspect existing
  # tool-credential Secrets); ExternalSecretOperator owns secret writes
  # into tenant namespaces. The operator never mutates Secret data
  # directly — tenant credential plumbing flows through ESO.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["appprojects", "applications", "workflows", "workflowtemplates", "cronworkflows", "analysisruns", "analysistemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kagent.dev"]
    resources: ["agents", "modelconfigs", "toolservers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["agentgateway.dev"]
    resources: ["routes", "listeners"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects", "triggerauthentications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["resource.k8s.io"]
    resources: ["resourceclaimtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "operator.fullname" . }}-manager
  labels: {{- include "operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
