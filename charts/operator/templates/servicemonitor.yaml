{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "operator.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
{{- if .Values.metrics.secure }}
      scheme: https
      tlsConfig:
        # The metrics server presents a self-signed cert controller-runtime
        # generates in-memory. Skip CA verification (there is no CA to pin) and
        # rely on the bearer-token authorization below for access control: the
        # endpoint is cluster-internal, NetworkPolicy-gated, and the token
        # proves the scraper is the metrics-reader identity.
        insecureSkipVerify: true
      authorization:
        type: Bearer
        credentials:
          name: {{ include "operator.fullname" . }}-metrics-reader-token
          key: token
{{- else }}
      scheme: http
{{- end }}
{{- end }}
