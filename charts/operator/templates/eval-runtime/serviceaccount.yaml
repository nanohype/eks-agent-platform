{{- if .Values.evalRuntime.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  # Name + namespace are byte-pinned to the terraform/components/eval-runtime
  # IRSA trust condition (system:serviceaccount:eval-runner:eval-runner) — do
  # not override unless that component is updated in lockstep.
  name: {{ .Values.evalRuntime.serviceAccount.name }}
  namespace: {{ .Values.evalRuntime.namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: eval-runtime
  {{- with .Values.evalRuntime.serviceAccount.roleArn }}
  annotations:
    # Injected per-cluster by the eks-gitops addons-agent-operator ApplicationSet
    # from the eks-agent-platform/eval-runner-role-arn cluster-Secret annotation.
    eks.amazonaws.com/role-arn: {{ . }}
  {{- end }}
{{- end }}
