{{- if .Values.evalRuntime.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  # Name + namespace are byte-pinned to the terraform/components/eval-runtime
  # Pod Identity association (system:serviceaccount:eval-runner:eval-runner) — do
  # not override unless that component is updated in lockstep. The association
  # binds AWS credentials to this ServiceAccount; no role-arn annotation is set.
  name: {{ .Values.evalRuntime.serviceAccount.name }}
  namespace: {{ .Values.evalRuntime.namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: eval-runtime
{{- end }}
