apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "operator.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- if and .Values.metrics.enabled .Values.metrics.podScrapeAnnotations (not .Values.metrics.secure) }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      serviceAccountName: {{ include "operator.serviceAccountName" . }}
      priorityClassName: {{ .Values.priorityClassName }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --leader-election-id={{ .Values.leaderElection.id }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --metrics-secure={{ .Values.metrics.secure }}
            - --health-probe-bind-address=:8081
            - --tenant-requeue-interval={{ .Values.reconcilers.tenant.requeueInterval }}
            - --budget-requeue-interval={{ .Values.reconcilers.budget.requeueInterval }}
            - --tenant-workers={{ .Values.reconcilers.tenant.concurrent }}
            - --platform-workers={{ .Values.reconcilers.platform.concurrent }}
            - --gateway-workers={{ .Values.reconcilers.gateway.concurrent }}
            - --runtime-workers={{ .Values.reconcilers.runtime.concurrent }}
            - --sandbox-workers={{ .Values.reconcilers.sandbox.concurrent }}
            - --agentsandbox-workers={{ .Values.reconcilers.agentsandbox.concurrent }}
            - --shim-image={{ include "operator.image" . }}
            - --budget-workers={{ .Values.reconcilers.budget.concurrent }}
            - --eval-workers={{ .Values.reconcilers.eval.concurrent }}
            - --batch-workers={{ .Values.reconcilers.batch.concurrent }}
            - --batch-poll-interval={{ .Values.reconcilers.batch.pollInterval }}
            - --environment={{ .Values.config.environment }}
            - --region={{ .Values.config.region }}
            - --network-engine={{ .Values.networkPolicy.engine }}
            - --vcluster-chart-repo={{ .Values.vcluster.chart.repoURL }}
            - --vcluster-chart-version={{ .Values.vcluster.chart.version }}
            {{- if .Values.vcluster.initCharts }}
            - --vcluster-init-charts={{ .Values.vcluster.initCharts | toJson }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGENTS_ENVIRONMENT
              value: {{ .Values.config.environment | quote }}
            - name: AGENTS_CLUSTER_NAME
              value: {{ .Values.config.clusterName | quote }}
            - name: AGENTS_REGION
              value: {{ .Values.config.region | quote }}
            - name: AGENTS_NETWORK_ENGINE
              value: {{ .Values.networkPolicy.engine | quote }}
            {{- with .Values.config.tags.costCenter }}
            - name: AGENTS_COST_CENTER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.tags.businessUnit }}
            - name: AGENTS_BUSINESS_UNIT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.tags.dataClassification }}
            - name: AGENTS_DATA_CLASSIFICATION
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.tags.compliance }}
            - name: AGENTS_COMPLIANCE
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: probe
              containerPort: 8081
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: probe
            # Cold start = leader election + AWS client build + SSM config load +
            # manager start. Allow up to 30 × 5s = 150s before liveness takes
            # over, so a slow bootstrap never trips the restart loop this probe
            # exists to prevent.
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
