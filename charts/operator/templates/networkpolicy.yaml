{{- if .Values.networkPolicy.enabled -}}
{{- if eq .Values.networkPolicy.engine "cilium" }}
# CiliumNetworkPolicy — the cilium-native expression of the operator's
# ingress/egress. Required because a vanilla NetworkPolicy cannot allow
# egress to the kube-apiserver under cilium: the API ClusterIP resolves to
# the reserved `kube-apiserver` identity, which ipBlock/CIDR rules (even
# 0.0.0.0/0) do not match. Without this the operator cannot register its
# field-indexers and CrashLoops on `dial tcp <apiserver>:443: i/o timeout`.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "operator.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels: {{- include "operator.selectorLabels" . | nindent 6 }}
  ingress:
    # Prometheus scrape from the monitoring namespace.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "{{ .Values.metrics.port }}"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # kube-apiserver — matched by reserved identity. This is the rule a
    # vanilla NetworkPolicy cannot express under cilium.
    - toEntities:
        - kube-apiserver
    # AWS APIs (Bedrock/IAM/KMS/STS/SSM/EventBridge) over TLS — reachable
    # as `world` whether via public endpoints or in-VPC interface endpoints.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # vcluster isolation tier: the operator's target-client swap + ArgoCD cluster
    # registration reach each per-Platform vcluster API server, which runs in the
    # tenant namespaces the operator provisions (namespace label
    # app.kubernetes.io/part-of: eks-agent-platform). Scoped to those namespaces —
    # without it a vcluster-tier Platform can never reach VClusterReady on a cilium
    # cluster. Port 8443 is the vcluster control-plane's own listen port: cilium
    # enforces L4 policy on the translated pod port (targetPort 8443), not the
    # Service port 443, so 8443 is the load-bearing one; 443 is kept for CNIs that
    # match the Service port.
    - toEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.app.kubernetes.io/part-of: eks-agent-platform
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "8443"
              protocol: TCP
{{- else }}
# Vanilla NetworkPolicy — portable fallback for non-cilium clusters
# (networkPolicy.engine: kubernetes). NOTE: under cilium this cannot allow
# egress to the kube-apiserver (the API ClusterIP maps to the reserved
# kube-apiserver identity, which CIDR rules do not match) — use the cilium
# engine on cilium clusters.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Prometheus scrape
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: metrics
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # AWS APIs via interface VPC endpoints (any IP — TLS-only enforced by AWS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
    # kube-apiserver — scoped to the cluster service IP, not a wildcard
    # namespaceSelector (which would allow egress to every pod in every
    # namespace on those ports). The default `kubernetesServiceCIDR` covers
    # the EKS-default 172.20.0.1/32; override per-environment if your cluster
    # uses a different service CIDR (e.g. 10.100.0.1/32 on legacy EKS).
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.kubernetesServiceCIDR | default "172.20.0.1/32" }}
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # vcluster isolation tier: reach each per-Platform vcluster API server in the
    # tenant namespaces the operator provisions (label
    # app.kubernetes.io/part-of: eks-agent-platform). 8443 is the vcluster
    # control-plane's own port (Service targetPort); 443 the Service port.
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: eks-agent-platform
      ports:
        - port: 443
          protocol: TCP
        - port: 8443
          protocol: TCP
{{- end }}
{{- end }}
