{{- if and .Values.webhooks.enabled .Values.webhooks.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "operator.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels: {{- include "operator.labels" . | nindent 4 }}
spec:
  # The Deployment mounts this Secret at /tmp/k8s-webhook-server/serving-certs
  # so controller-runtime's webhook server finds tls.crt + tls.key on startup.
  secretName: {{ include "operator.fullname" . }}-webhook-cert
  duration: 2160h    # 90 days
  renewBefore: 360h  # renew 15 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  subject:
    organizations:
      - stxkxs.io
  commonName: {{ include "operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
  dnsNames:
    - {{ include "operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "operator.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.webhooks.certManager.issuerRef.kind }}
    name: {{ .Values.webhooks.certManager.issuerRef.name }}
  usages:
    - server auth
    - digital signature
    - key encipherment
{{- end }}
