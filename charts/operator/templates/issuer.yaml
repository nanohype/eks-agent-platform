{{- /*
Optionally provision a self-signed ClusterIssuer when the user doesn't already
have one. Off by default — production should reference an existing
ClusterIssuer (e.g. one backed by Vault, ACM Private CA, or a real CA).

Set webhooks.certManager.installSelfSignedIssuer=true to enable. The issuer
this produces matches the default Values.webhooks.certManager.issuerRef.name.
*/ -}}
{{- if and .Values.webhooks.enabled .Values.webhooks.certManager.enabled .Values.webhooks.certManager.installSelfSignedIssuer -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.webhooks.certManager.issuerRef.name }}
  labels: {{- include "operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
