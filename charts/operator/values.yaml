# Default values for the eks-agent-platform operator chart.

replicaCount: 2

image:
  repository: ghcr.io/nanohype/eks-agent-platform/operator
  tag: "" # defaults to .Chart.AppVersion if empty
  pullPolicy: IfNotPresent
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: operator
  annotations: {} # eks.amazonaws.com/role-arn injected per-env

leaderElection:
  enabled: true
  id: eks-agent-platform.nanohype.dev

# Extra args appended verbatim to the operator container's command line.
# Useful for local-dev (`--disable-aws`), debug flags, or env-specific
# overrides not captured by the structured config block above. Each
# entry is rendered as-is into args:.
extraArgs: []

reconcilers:
  tenant:
    concurrent: 1
    requeueInterval: 5m
  platform:
    concurrent: 3
  gateway:
    concurrent: 3
  runtime:
    concurrent: 5
  sandbox:
    concurrent: 3
  agentsandbox:
    concurrent: 5
  budget:
    concurrent: 1
    requeueInterval: 1h
  eval:
    concurrent: 2
  batch:
    concurrent: 2
    pollInterval: 2m

config:
  ssmPathPrefix: /eks-agent-platform
  environment: ""
  region: us-west-2
  # Org-dimension tag values stamped on the tenant IRSA roles the operator
  # creates (resource-tagging standard, required tier). Empty falls back to the
  # operator's defaults (platform-engineering / engineering / internal / soc2);
  # override per-env via values-<env>.yaml (e.g. dataClassification: confidential
  # in production).
  tags:
    costCenter: ""
    businessUnit: ""
    dataClassification: ""
    compliance: ""
  # The EKS cluster name (used to create tenant Pod Identity associations) is
  # read from SSM (/eks-agent-platform/<env>/cluster/name) by operatorconfig,
  # alongside the operator's other AWS config — not injected as a Helm value.
  killSwitch:
    eventBusName: ""
  bedrock:
    baselineGuardrailId: ""
  cost:
    athenaWorkgroup: ""
    athenaDatabase: ""

webhooks:
  enabled: true
  port: 9443
  failurePolicy: Fail
  # CA bundle is injected automatically by cert-manager via the
  # cert-manager.io/inject-ca-from annotation on the kubebuilder-generated
  # ValidatingWebhookConfiguration / MutatingWebhookConfiguration.
  caBundle: ""
  certManager:
    enabled: true
    # When true, this chart provisions a self-signed ClusterIssuer named
    # below. Leave false in production and reference your real issuer
    # (Vault, ACM Private CA, etc.).
    installSelfSignedIssuer: false
    issuerRef:
      kind: ClusterIssuer
      name: selfsigned-cluster-issuer

metrics:
  enabled: true
  port: 8080
  service:
    type: ClusterIP
  serviceMonitor:
    enabled: true
  # Pod-level prometheus.io scrape annotations. The EKS clusters scrape with the
  # Grafana Agent (→ Amazon Managed Prometheus) by pod annotation, with no
  # prometheus-operator — so the ServiceMonitor above is consumed only on
  # kube-prometheus-stack clusters (kx). These annotations make the operator's
  # controller-runtime reconcile metrics reach AMP in prod. The operator
  # NetworkPolicy already allows scrape from the monitoring namespace (where the
  # Grafana Agent runs).
  podScrapeAnnotations: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: system-cluster-critical

networkPolicy:
  enabled: true
  # Policy engine. `cilium` emits a CiliumNetworkPolicy that allows egress to
  # the kube-apiserver via its reserved identity — the only way to express
  # that under cilium, which is the CNI on every cluster this operator runs
  # on (kx + EKS). `kubernetes` emits a vanilla NetworkPolicy for non-cilium
  # clusters (its kube-apiserver egress rule does NOT work under cilium).
  engine: cilium
  # CIDR of the kube-apiserver service. Only used by the `kubernetes` engine.
  # EKS default is 172.20.0.1/32; legacy or self-managed clusters may use a
  # different service IP (e.g. 10.100.0.1/32). Override per-environment.
  kubernetesServiceCIDR: "172.20.0.1/32"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── eval-runtime ─────────────────────────────────────────────────────────────
# The Argo Workflows runtime the operator submits EvalSuite runs to: a
# WorkflowTemplate (eval-runner), the gating AnalysisTemplate, and the SA + RBAC
# the workflow pods run under. Ships with the operator so the product owns its
# own runtime; eks-gitops deploys the chart. Enabled by default (it was applied
# unconditionally by the former gitops overlay).
#
# Requires the Argo Workflows CRD on the cluster (eks-gitops addons-argo-platform).
evalRuntime:
  enabled: true
  # Create the eval-runner namespace. Disable if it is provisioned elsewhere.
  createNamespace: true
  # Name/namespace are byte-pinned to the terraform/components/eval-runtime IRSA
  # trust (system:serviceaccount:eval-runner:eval-runner). Change both the chart
  # and that component together, or IRSA breaks.
  namespace: eval-runner
  serviceAccount:
    # Bound to its IAM role by an EKS Pod Identity association (created by
    # terraform/components/eval-runtime) — no role-arn annotation.
    name: eval-runner
  # S3 bucket the eval workflow writes reports to (terraform eval-runtime output).
  # Injected per-cluster; empty in the base chart.
  evalReportsBucket: ""
  # ModelGateway endpoint every fleet routes through.
  gatewayUrl: http://agentgateway.agentgateway.svc.cluster.local:8080
  rollouts:
    # The Argo Rollouts AnalysisTemplate (eval-suite-gate). Off by default: it
    # needs the Argo Rollouts CRD, which is not guaranteed on every cluster.
    enabled: false

# ── operator SLO ─────────────────────────────────────────────────────────────
# The operator's own observability: recording rules + alerts (PrometheusRule),
# the kube-state-metrics CustomResourceState config that makes kube_customresource_*
# metrics exist, and the persona alert routing (AlertmanagerConfig).
#
# Requires the prometheus-operator CRDs (eks-gitops bootstrap wave 0).
slo:
  enabled: true
  createNamespace: true
  namespace: eks-agent-platform-monitoring
  # The namespace the operator runs in — used in the PromQL metric selectors.
  operatorNamespace: eks-agent-platform
  alerting:
    # The AlertmanagerConfig persona routing. Off by default: its receivers
    # reference six external Secrets (pagerduty-platform, slack-webhook-*) that
    # must pre-exist. Enable per-env (production) once those Secrets are provisioned.
    enabled: false
