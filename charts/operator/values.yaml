# Default values for the eks-agent-platform operator chart.

replicaCount: 2

image:
  repository: ghcr.io/nanohype/eks-agent-platform/operator
  tag: "" # defaults to .Chart.AppVersion if empty
  pullPolicy: IfNotPresent
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: operator
  annotations: {} # eks.amazonaws.com/role-arn injected per-env

leaderElection:
  enabled: true
  id: eks-agent-platform.nanohype.dev

# Extra args appended verbatim to the operator container's command line.
# Useful for local-dev (`--disable-aws`), debug flags, or env-specific
# overrides not captured by the structured config block above. Each
# entry is rendered as-is into args:.
extraArgs: []

reconcilers:
  tenant:
    concurrent: 1
    requeueInterval: 5m
  platform:
    concurrent: 3
  gateway:
    concurrent: 3
  runtime:
    concurrent: 5
  sandbox:
    concurrent: 3
  agentsandbox:
    concurrent: 5
  budget:
    concurrent: 1
    requeueInterval: 1h
  eval:
    concurrent: 2
  batch:
    concurrent: 2
    pollInterval: 2m

config:
  environment: ""
  # Full EKS cluster name this operator serves (e.g. development-analytics). Keys the
  # per-cluster SSM subtree /eks-agent-platform/<clusterName>/ and prefixes the
  # tenant/session roles the operator mints, isolating co-located sibling
  # clusters. Required — set per cluster at install time.
  clusterName: ""
  region: us-west-2
  # Org-dimension tag values stamped on the tenant IRSA roles the operator
  # creates (resource-tagging standard, required tier). Empty falls back to the
  # operator's defaults (platform-engineering / engineering / internal / soc2);
  # override per-env via values-<env>.yaml (e.g. dataClassification: confidential
  # in production).
  tags:
    costCenter: ""
    businessUnit: ""
    dataClassification: ""
    compliance: ""
  killSwitch:
    eventBusName: ""
  bedrock:
    baselineGuardrailId: ""
  cost:
    athenaWorkgroup: ""
    athenaDatabase: ""

metrics:
  enabled: true
  port: 8080
  # Serve metrics over HTTPS and require every scrape to authenticate +
  # authorize (controller-runtime's WithAuthenticationAndAuthorization filter:
  # TokenReview + a SubjectAccessReview on the /metrics nonResourceURL). This
  # closes the info-disclosure gap where the NetworkPolicy was the only gate.
  # The chart then wires the operator SA for token review (system:auth-delegator)
  # and, for the ServiceMonitor path, a metrics-reader SA + token the scraper
  # presents (see rbac.yaml, servicemonitor.yaml).
  #
  # A scraper MUST present a bearer token over https to read the endpoint. An
  # unauthenticated annotation-based scrape can no longer read it, so the
  # plaintext prometheus.io scrape annotations below are suppressed while secure.
  # Set false only where no kube-apiserver is reachable to review tokens.
  secure: true
  service:
    type: ClusterIP
  serviceMonitor:
    enabled: true
  # Pod-level prometheus.io scrape annotations for annotation-based scrapers
  # (e.g. the Grafana Agent → Amazon Managed Prometheus, which runs without a
  # prometheus-operator so it does not consume the ServiceMonitor). These are
  # only emitted when metrics.secure is false — an annotation scrape is
  # plaintext and unauthenticated, which the secure endpoint rejects; a secure
  # deployment is scraped via the authenticated ServiceMonitor (kube-prometheus-
  # stack) or by an agent taught to present the metrics-reader token over https.
  # The operator NetworkPolicy allows scrape from the monitoring namespace.
  podScrapeAnnotations: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}

priorityClassName: system-cluster-critical

networkPolicy:
  enabled: true
  # Policy engine. `cilium` emits a CiliumNetworkPolicy that allows egress to
  # the kube-apiserver via its reserved identity — the only way to express
  # that under cilium, which is the CNI on every cluster this operator runs
  # on (kx + EKS). `kubernetes` emits a vanilla NetworkPolicy for non-cilium
  # clusters (its kube-apiserver egress rule does NOT work under cilium).
  engine: cilium
  # CIDR of the kube-apiserver service. Only used by the `kubernetes` engine.
  # EKS default is 172.20.0.1/32; legacy or self-managed clusters may use a
  # different service IP (e.g. 10.100.0.1/32). Override per-environment.
  kubernetesServiceCIDR: "172.20.0.1/32"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ── vcluster hard-isolation tier ─────────────────────────────────────────────
# Config for Platform.spec.isolation: vcluster. The operator declares a
# per-Platform virtual cluster as an ArgoCD Application pinned to chart.version,
# and bootstraps the fleet's control plane (kagent) + autoscaler (KEDA) INSIDE
# each vcluster via the chart's init-charts, so the tenant's control+data plane
# live entirely within the isolation boundary. ArgoCD is a hard prerequisite for
# this tier (see docs/adr/0009-vcluster-isolation-tier.md); the namespace tier
# ignores this block entirely.
vcluster:
  chart:
    # The upstream vcluster chart. OCI mirror: oci://ghcr.io/loft-sh/charts/vcluster.
    repoURL: https://charts.loft.sh
    # Pinned chart version (targetRevision). Renovate proposes bumps; a human
    # reviews majors — the operator never auto-upgrades a running vcluster.
    version: "0.35.2"
  # initCharts are deployed inside every per-Platform vcluster on startup
  # (experimental.deploy.vcluster.helm). The recommended placement for kagent +
  # KEDA. Set to [] to ship a containment-only vcluster (no in-vcluster fleet
  # control plane). Field names are the operator flag's JSON contract
  # (chartName/repoURL/version/releaseName/namespace/values).
  initCharts:
    - chartName: kagent-crds
      repoURL: oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds
      version: "0.9.11"
      releaseName: kagent-crds
      namespace: kagent
    - chartName: kagent
      repoURL: oci://ghcr.io/kagent-dev/kagent/helm/kagent
      version: "0.9.11"
      releaseName: kagent
      namespace: kagent
    - chartName: keda
      repoURL: https://kedacore.github.io/charts
      version: "2.20.1"
      releaseName: keda
      namespace: keda

# ── eval-runtime ─────────────────────────────────────────────────────────────
# The Argo Workflows runtime the operator submits EvalSuite runs to: a
# WorkflowTemplate (eval-runner), the gating AnalysisTemplate, and the SA + RBAC
# the workflow pods run under. Ships with the operator so the product owns its
# own runtime; eks-gitops deploys the chart. Enabled by default (it was applied
# unconditionally by the former gitops overlay).
#
# Requires the Argo Workflows CRD on the cluster (eks-gitops addons-argo-platform).
evalRuntime:
  enabled: true
  # Create the eval-runner namespace. Disable if it is provisioned elsewhere.
  createNamespace: true
  # Name/namespace are byte-pinned to the terraform/components/eval-runtime IRSA
  # trust (system:serviceaccount:eval-runner:eval-runner). Change both the chart
  # and that component together, or IRSA breaks.
  namespace: eval-runner
  serviceAccount:
    # Bound to its IAM role by an EKS Pod Identity association (created by
    # terraform/components/eval-runtime) — no role-arn annotation.
    name: eval-runner
  # S3 bucket the eval workflow writes reports to (terraform eval-runtime output).
  # Injected per-cluster; empty in the base chart.
  evalReportsBucket: ""
  # ModelGateway endpoint every fleet routes through.
  gatewayUrl: http://agentgateway.agentgateway.svc.cluster.local:8080
  # The eval-runner image the WorkflowTemplate's run/score/writeback steps run.
  # Built + cosign-signed + SBOM-attested by release.yaml on an eval-runner-v*
  # tag; the tag here is the released version, never a floating :latest.
  image:
    repository: ghcr.io/nanohype/eks-agent-platform/eval-runner
    tag: "0.1.0"
  rollouts:
    # The Argo Rollouts AnalysisTemplate (eval-suite-gate). Off by default: it
    # needs the Argo Rollouts CRD, which is not guaranteed on every cluster.
    enabled: false

# ── operator SLO ─────────────────────────────────────────────────────────────
# The operator's own SLO recording rules + burn-rate alerts as a PrometheusRule,
# plus the persona alert routing (AlertmanagerConfig).
#
# Off by default: a PrometheusRule is inert without a Prometheus Operator to
# evaluate it, and this platform runs none (grafana-agent → Amazon Managed
# Prometheus, alerts in Amazon Managed Grafana). The live operator SLO alerting
# is the GrafanaAlertRuleGroup in eks-gitops (dashboards/base/alerting/
# agent-operator.yaml); the kube_customresource_* metrics come from the
# eks-gitops kube-state-metrics CustomResourceState, not this block. Enable on a
# cluster that runs an operator (e.g. local kx with kube-prometheus-stack).
slo:
  enabled: false
  createNamespace: true
  namespace: eks-agent-platform-monitoring
  # The namespace the operator runs in — used in the PromQL metric selectors.
  operatorNamespace: eks-agent-platform
  alerting:
    # The AlertmanagerConfig persona routing. Off by default: its receivers
    # reference six external Secrets (pagerduty-platform, slack-webhook-*) that
    # must pre-exist. Enable per-env (production) once those Secrets are provisioned.
    enabled: false
