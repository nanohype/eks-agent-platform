apiVersion: v2
name: operator
description: eks-agent-platform — Kubernetes operator (CRDs + Deployment + RBAC).
type: application
# 0.2.0 — folds the eval-runtime (Argo WorkflowTemplate/AnalysisTemplate) and the
# operator SLO (PrometheusRule/AlertmanagerConfig/CR-state metrics) into the chart
# behind evalRuntime.* / slo.* toggles. appVersion unchanged — the operator binary
# is untouched.
version: 0.2.1
