# Opinionated tenant scaffold. Consumed by `agentctl platform new`.
#
# Render a complete tenant in one helm install:
#   helm template marketing-team ./charts/tenant \
#     --set platform.name=marketing-team \
#     --set platform.persona=marketing \
#     --set platform.tenant=acme \
#     --set budget.monthlyUsd=2500

# Where this tenant's control-plane CRs (Platform, BudgetPolicy, ModelGateway,
# AgentFleet, EvalSuite) live. This is the first dial of the tenant isolation
# tier — the template grows with you instead of being outgrown:
#   shared (default)  controlPlaneNamespace: eks-agent-platform — every tenant's
#                     control-plane CRs in one platform-team-owned namespace.
#                     Simplest; right for a startup / few tenants.
#   dedicated         controlPlaneNamespace: eap-tenant-<name> — per-tenant
#                     control-plane namespace for isolation / per-tenant GitOps
#                     granularity at scale or under compliance.
#   harder            platform.isolation: vcluster, then a dedicated cluster —
#                     the workload-side dials, orthogonal to this one.
# The Tenant CR is cluster-scoped and the operator watches Platforms
# cluster-wide, so moving a tenant up a tier is a re-render, never a migration.
# See docs/architecture/tenant-isolation-tiers.md.
controlPlaneNamespace: eks-agent-platform

platform:
  name: "" # required
  tenant: "" # required
  persona: generic # one of: sales-ops, support, finance, ops, founder, eng, marketing, legal, generic
  displayName: ""
  isolation: namespace # or vcluster
  # Emit the cluster-scoped Tenant CR this Platform belongs to. Default true
  # (one tenant = one Platform). Set false on additional Platforms that share an
  # already-created Tenant (one Tenant owns many Platforms).
  createTenant: true
  compliance:
    hipaa: false
    soc2: true

identity:
  # Either pick model families or specific models. The operator expands the
  # choice into Bedrock foundation-model + cross-region inference-profile ARNs
  # and reconciles a bedrock-model-scoping policy that denies invoke on
  # everything outside that set.
  allowedModelFamilies:
    - anthropic
    - amazon-nova
  allowedModels: []
  extraPolicyArns: []

budget:
  monthlyUsd: 500
  alertThresholdsPercent: [50, 80, 100]
  killSwitchEnabled: true

# Persona-specific defaults for the ModelGateway + AgentFleet.
modelGateway:
  defaultRoute:
    name: primary
    modelFamily: anthropic
    modelId: us.anthropic.claude-3-5-sonnet-20241022-v2:0
    crossRegionProfile: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
    rateLimit: 60

agentFleet:
  scaling:
    enabled: true
    min: 1
    max: 5
    queueDepthTrigger: 10
  agents:
    - name: assistant
      systemPrompt: "You are a helpful assistant for the {{ .Values.platform.persona }} persona."
      modelRoute: primary

evalSuite:
  enabled: true
  schedule: "0 6 * * *" # daily 06:00 UTC
  passThreshold: "0.85"
  casesFromManifest: "" # empty = inline default cases below
  cases:
    - name: smoke-test
      input: "Reply with 'pong'."
      expectContains: ["pong"]
      maxLatencyMs: 5000
