apiVersion: agents.nanohype.dev/v1alpha1
kind: AgentFleet
metadata:
  name: {{ .Values.platform.name }}-fleet
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: eks-agent-platform
    eks-agent-platform/tenant: {{ .Values.platform.tenant }}
spec:
  platformRef:
    name: {{ .Values.platform.name }}
  scaling:
    # Defaults guard against unset values rendering as 'min: ' (empty)
    # which fails CRD integer validation. CRD-level defaulting also fires
    # at admission time, but rendering valid YAML up-front is cleaner.
    enabled: {{ .Values.agentFleet.scaling.enabled | default true }}
    min: {{ .Values.agentFleet.scaling.min | default 1 }}
    max: {{ .Values.agentFleet.scaling.max | default 10 }}
    queueDepthTrigger: {{ .Values.agentFleet.scaling.queueDepthTrigger | default 10 }}
  agents:
    {{- range .Values.agentFleet.agents }}
    - name: {{ .name }}
      systemPrompt: {{ tpl .systemPrompt $ | quote }}
      modelRoute: {{ .modelRoute }}
      {{- with .tools }}
      tools: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .replicas }}
      replicas: {{ . }}
      {{- end }}
    {{- end }}
