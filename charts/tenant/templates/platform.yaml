{{- if not .Values.platform.name -}}{{ fail "platform.name is required" }}{{- end -}}
{{- if not .Values.platform.tenant -}}{{ fail "platform.tenant is required" }}{{- end -}}
{{- if not .Values.platform.persona -}}{{ fail "platform.persona is required (one of: sales-ops, support, finance, ops, founder, eng, marketing, legal, generic)" }}{{- end -}}
apiVersion: platform.nanohype.dev/v1alpha1
kind: Platform
metadata:
  name: {{ .Values.platform.name }}
  namespace: {{ .Values.controlPlaneNamespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: eks-agent-platform
    eks-agent-platform/persona: {{ .Values.platform.persona }}
    eks-agent-platform/tenant: {{ .Values.platform.tenant }}
spec:
  displayName: {{ .Values.platform.displayName | default .Values.platform.name | quote }}
  persona: {{ .Values.platform.persona }}
  tenant: {{ .Values.platform.tenant }}
  isolation: {{ .Values.platform.isolation }}
  budget:
    name: {{ .Values.platform.name }}-budget
  identity:
    # allowedModels and allowedModelFamilies are mutually exclusive in the CRD —
    # emit exactly one, and fail the render rather than ship a Platform the
    # operator's webhook rejects (or a both-empty identity that passes admission
    # but fails the conformance audit).
{{- if and (gt (len .Values.identity.allowedModels) 0) (gt (len .Values.identity.allowedModelFamilies) 0) }}
{{- fail "identity.allowedModels and identity.allowedModelFamilies are mutually exclusive; set only one" }}
{{- else if gt (len .Values.identity.allowedModels) 0 }}
    allowedModels: {{- toYaml .Values.identity.allowedModels | nindent 6 }}
{{- else if gt (len .Values.identity.allowedModelFamilies) 0 }}
    allowedModelFamilies: {{- toYaml .Values.identity.allowedModelFamilies | nindent 6 }}
{{- else }}
{{- fail "identity: set one of allowedModels or allowedModelFamilies" }}
{{- end }}
    extraPolicyArns: {{- toYaml .Values.identity.extraPolicyArns | nindent 6 }}
  compliance:
    hipaa: {{ .Values.platform.compliance.hipaa }}
    soc2: {{ .Values.platform.compliance.soc2 }}
