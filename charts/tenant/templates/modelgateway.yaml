apiVersion: agents.nanohype.dev/v1alpha1
kind: ModelGateway
metadata:
  name: {{ .Values.platform.name }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: eks-agent-platform
    eks-agent-platform/tenant: {{ .Values.platform.tenant }}
spec:
  platformRef:
    name: {{ .Values.platform.name }}
  routes:
    - name: {{ .Values.modelGateway.defaultRoute.name }}
      modelFamily: {{ .Values.modelGateway.defaultRoute.modelFamily }}
      modelId: {{ .Values.modelGateway.defaultRoute.modelId }}
      {{- with .Values.modelGateway.defaultRoute.crossRegionProfile }}
      crossRegionProfile: {{ . }}
      {{- end }}
      {{- with .Values.modelGateway.defaultRoute.rateLimit }}
      rateLimit: {{ . }}
      {{- end }}
