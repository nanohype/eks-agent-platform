name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Tuesday 06:00 UTC — catches new CVEs even when no PRs land.
    - cron: "0 6 * * 2"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The official gitleaks-action gates organization repos behind a paid
      # license; the gitleaks CLI itself is free. Pin the version, verify the
      # download against its published sha256, then run it directly — a tampered
      # or swapped tarball fails the checksum instead of executing.
      - name: gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          # sha256 of gitleaks_${VERSION}_linux_x64.tar.gz from the release
          # checksums.txt — bump both together when moving versions.
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git --config .gitleaks.toml --redact --no-banner .

  trivy-config:
    name: trivy (terraform + dockerfile misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          # Inherent privilege requirements (device plugins, operator
          # ClusterRole) are suppressed with file-scoped justifications
          # in .trivyignore.yaml. Anything not in that file IS expected
          # to fail the build.
          trivyignores: ".trivyignore.yaml"
          exit-code: "1"
          # No ignore-unfixed here: it only applies to CVE scanning. A
          # misconfiguration finding is always fixable in-repo (it is our own
          # terraform/Dockerfile), so nothing is ever "unfixed" to ignore.
          format: sarif
          output: trivy-config.sarif
          # Helm scanning is covered by the ci workflow's helm lint +
          # template job. trivy's helm scanner uses a default k8s 1.20
          # client which can't render our kubeVersion-pinned chart, and
          # falls over on required values without overrides — those
          # errors aren't security findings.
          skip-dirs: "charts"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  trivy-fs:
    name: trivy (filesystem vuln scan — go + npm deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          # ignore-unfixed stays true here (dependency CVE scan), deliberately.
          # A HIGH/CRITICAL with no upstream fix can't be remediated by a version
          # bump, so failing on it would be a permanent, unactionable red that
          # blocks unrelated PRs. The weekly schedule (cron above) re-runs the
          # scan, so the moment a patched release ships the finding surfaces and
          # the fix is a normal go.mod/package.json bump. Fixable HIGH/CRITICAL
          # still fail the build immediately.
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: "node_modules,**/.terraform"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init --config .tflint.hcl
      # --chdir changes CWD so .tflint.hcl resolution must be absolute.
      - run: tflint --recursive --config "$GITHUB_WORKSPACE/.tflint.hcl" --chdir=terraform/components --minimum-failure-severity=warning

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
          cache-dependency-path: operators/go.sum
      - uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: -severity medium -fmt sarif -out gosec.sarif ./operators/...
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec

  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
          cache-dependency-path: operators/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: operators
          version: v2.11.4

  # govulncheck complements the trivy dependency scan: it is Go-vulnerability-DB
  # aware and call-graph-driven, so it only reports advisories whose vulnerable
  # symbol the operator actually reaches — far less noise than a manifest-level
  # scan, and it covers stdlib CVEs (a Go-toolchain fix) that trivy's fs scan
  # misses. Runs on every PR and on the weekly schedule.
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
          cache-dependency-path: operators/go.sum
      - name: govulncheck
        working-directory: operators
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
