name: release

on:
  push:
    tags:
      - "operator-v*"
      - "sandbox-worker-v*"
      - "eval-runner-v*"
      - "charts-v*"
      - "sdk-v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  operator-image:
    name: build + sign operator image
    if: startsWith(github.ref, 'refs/tags/operator-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/operator-v}" >> "$GITHUB_OUTPUT"
      - name: docker login (ghcr.io)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: build + push (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: operators/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}/operator:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}/operator:latest
      - name: sign (keyless, OIDC)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/operator:${{ steps.ver.outputs.version }}
      - name: sbom
        run: |
          syft "ghcr.io/${{ github.repository }}/operator:${{ steps.ver.outputs.version }}" -o spdx-json > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson ghcr.io/${{ github.repository }}/operator:${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-operator-${{ steps.ver.outputs.version }}
          path: sbom.spdx.json

  sandbox-worker-image:
    name: build + sign sandbox worker image
    if: startsWith(github.ref, 'refs/tags/sandbox-worker-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/sandbox-worker-v}" >> "$GITHUB_OUTPUT"
      - name: docker login (ghcr.io)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: build + push (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: sandbox-worker/
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}/sandbox-worker:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}/sandbox-worker:latest
      - name: sign (keyless, OIDC)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/sandbox-worker:${{ steps.ver.outputs.version }}
      - name: sbom
        run: |
          syft "ghcr.io/${{ github.repository }}/sandbox-worker:${{ steps.ver.outputs.version }}" -o spdx-json > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson ghcr.io/${{ github.repository }}/sandbox-worker:${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-sandbox-worker-${{ steps.ver.outputs.version }}
          path: sbom.spdx.json

  eval-runner-image:
    name: build + sign eval runner image
    if: startsWith(github.ref, 'refs/tags/eval-runner-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/eval-runner-v}" >> "$GITHUB_OUTPUT"
      - name: docker login (ghcr.io)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: build + push (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          # Repo root context: the image bundles the pnpm workspace (the runner
          # builds on @eks-agent/core + @eks-agent/pricing).
          context: .
          file: packages/eval-runner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}/eval-runner:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}/eval-runner:latest
      - name: sign (keyless, OIDC)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/eval-runner:${{ steps.ver.outputs.version }}
      - name: sbom
        run: |
          syft "ghcr.io/${{ github.repository }}/eval-runner:${{ steps.ver.outputs.version }}" -o spdx-json > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson ghcr.io/${{ github.repository }}/eval-runner:${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-eval-runner-${{ steps.ver.outputs.version }}
          path: sbom.spdx.json

  charts-oci:
    name: package + push charts to OCI
    if: startsWith(github.ref, 'refs/tags/charts-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: package + push
        run: |
          # Per-chart output dir so the glob expansion in helm push has
          # exactly one match — sharing /tmp/charts/ across charts would
          # let helm push see multiple .tgz files and fail with
          # "exactly one positional argument expected".
          for d in charts/*/; do
            name=$(basename "$d")
            mkdir -p "/tmp/charts/${name}"
            helm package "$d" -d "/tmp/charts/${name}"
            tgz="$(ls "/tmp/charts/${name}/${name}"-*.tgz | head -1)"
            helm push "$tgz" "oci://ghcr.io/${{ github.repository }}/charts"
          done

  sdk-npm:
    name: publish @eks-agent/* to npm
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
