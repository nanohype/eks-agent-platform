name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  placeholders:
    name: zero-placeholder gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/no-placeholders.sh

  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.0"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
          cache-dependency-path: operators/go.sum
      - run: pnpm install --frozen-lockfile
      - run: tofu fmt -check -recursive terraform/
      - run: pnpm format:check
      - run: cd operators && test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  tofu:
    name: tofu validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.0"
      - name: validate every component
        run: |
          for d in terraform/components/*/; do
            name=$(basename "$d")
            echo "::group::$name"
            (cd "$d" && tofu init -backend=false -input=false && tofu validate)
            echo "::endgroup::"
          done

  # ── Chart RBAC gate ──────────────────────────────────────────────────────
  # operators/config/rbac/role.yaml IS generated by controller-gen from the
  # kubebuilder markers. The operator chart's manager ClusterRole is NOT — it is
  # hand-maintained, and it drifted: the markers declared `impersonate` on users
  # and CRUD on clusterroles/clusterrolebindings, and the chart shipped neither.
  #
  # The operator could not create the impersonation RBAC its Platform controller
  # exists to create, its ClusterRole informer never synced, and every Platform CR
  # hung in phase=Provisioning — on a cluster where every pod was Running and every
  # ArgoCD Application was Healthy. helm lint, helm template, kubeconform and trivy
  # all passed: the manifests were valid, they just granted less than the code needs.
  #
  # A marker is a promise the chart has to keep. This asserts it does.
  chart-rbac:
    name: chart rbac covers markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pyyaml
      - run: ./scripts/check-chart-rbac.py

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          for d in charts/*/; do
            name=$(basename "$d")
            echo "::group::$name lint"
            helm lint "$d"
            echo "::endgroup::"
            echo "::group::$name template"
            # tenant chart requires platform.name + platform.tenant; pass
            # placeholders so template-rendering succeeds in CI.
            if [[ "$name" == "tenant" ]]; then
              helm template "$name" "$d" \
                --set platform.name=ci-smoke \
                --set platform.tenant=ci-smoke >/dev/null
            elif [[ "$name" == "operator" ]]; then
              # Default state, then the gated eval/slo paths so the Files.Get-wrapped
              # Argo/Prometheus/Alertmanager CRs are exercised (they don't render at
              # the defaults — rollouts + alerting are off).
              helm template "$name" "$d" >/dev/null
              helm template "$name" "$d" \
                --set evalRuntime.rollouts.enabled=true \
                --set slo.alerting.enabled=true \
                --set evalRuntime.serviceAccount.roleArn=ci-smoke-role \
                --set evalRuntime.evalReportsBucket=ci-smoke-bucket >/dev/null
            else
              helm template "$name" "$d" >/dev/null
            fi
            echo "::endgroup::"
          done

  ts:
    name: pnpm test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # pnpm test = turbo run lint typecheck test:coverage — each package's
      # vitest.config.ts layers measured coverage floors on vitest.base.ts,
      # so coverage can't silently regress.
      - run: pnpm test

  operator:
    name: go test + coverage gate (envtest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
          cache-dependency-path: operators/go.sum
      # make coverage-check runs the envtest + unit suite over a merged
      # -coverpkg=./internal/... profile, then enforces the org coverage floor
      # per package (75%), a per-file 100% on the security-critical IAM/KMS
      # paths, and documented lower floors for agentctl/awsclients. A drop below
      # any floor fails here rather than shipping an unproven control.
      - name: go test with envtest + coverage floors
        run: cd operators && make coverage-check
      - uses: golangci/golangci-lint-action@v7
        with:
          working-directory: operators
          version: v2.11.4

  # ── Generated CRD reference drift gate ───────────────────────────────────
  # docs/crd-reference/v1alpha1.md, the CRD manifests under config/crd, the
  # manager RBAC under config/rbac, and the deepcopy code are all generated from
  # the Go API types (make crd-docs → controller-gen + crd-ref-docs). A type
  # change that isn't regenerated drifts the published reference and the shipped
  # CRDs from the code. Regenerate and diff so it can't.
  crd-docs:
    name: crd reference in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: operators/go.mod
          cache-dependency-path: operators/go.sum
      - run: cd operators && make crd-docs
      - name: fail on drift
        run: git diff --exit-code -- docs/crd-reference operators/config/crd operators/config/rbac operators/api

  docs:
    name: typedoc builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Builds the API reference for every workspace package; fails on a broken
      # doc reference or a type error typedoc surfaces.
      - run: pnpm run docs

  # ── Generated-artifact drift gate ────────────────────────────────────────
  # The Lambda cost-publisher price table (pricing_data.py) and the TypeScript
  # scaffolder's model-default copy are generated from single sources of truth
  # (packages/pricing/src/data/bedrock-pricing.json and
  # operators/internal/agentctl/model_defaults.json). A hand-edit of a
  # generated file, or a change to the source that wasn't regenerated, drifts
  # the meter or the scaffold from the SSOT. Regenerate and diff so it can't.
  generated:
    name: generated files in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
      - run: node scripts/gen-lambda-pricing.mjs --check
      - run: node scripts/gen-model-defaults.mjs --check

  lambda:
    name: cost-pipeline lambda tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r terraform/components/cost-pipeline/lambda/requirements-test.txt
      - name: unit tests
        working-directory: terraform/components/cost-pipeline/lambda
        run: python -m unittest -v

  conventional-pr:
    name: conventional PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            harden
          scopes: |
            operators
            charts
            terraform
            core
            sdk
            pricing
            client
            cli
            examples
            docs
            ci
            release
            deps
            security
          requireScope: false
          subjectPattern: ^[a-z].+$

  vendored:
    name: vendored copy drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # eslint.base.mjs and scripts/sync-vendored.mjs are byte-identical
      # copies of their source of truth in nanohype/nanohype (declared in
      # scripts/vendored.json). A drifted copy is the defect — fixes land
      # upstream, then re-sync.
      - name: Checkout nanohype (vendored source of truth)
        uses: actions/checkout@v4
        with:
          repository: nanohype/nanohype
          path: .nanohype
          sparse-checkout: |
            library/config
            library/scripts

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Vendored copy drift check
        run: node scripts/sync-vendored.mjs --check
        env:
          NANOHYPE_DIR: .nanohype
