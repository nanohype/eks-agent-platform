version: "3"

vars:
  CLUSTER: '{{.CLUSTER | default "development-platform"}}'
  REGION: '{{.REGION | default "us-west-2"}}'
  COMPONENT: '{{.COMPONENT | default "all"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # === Composite ===

  ci:
    desc: "Full local CI: fmt:check, lint, validate, typecheck, test across all workspaces"
    cmds:
      - task: fmt:check
      - task: tofu:validate
      - task: helm:lint
      - task: helm:template
      - task: ts:test
      - task: operator:test
      - task: security:scan

  security:scan:
    desc: "Run security scanners (gitleaks + trivy config) if available locally"
    cmds:
      - |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks detect --no-banner --redact --config .gitleaks.toml
        else
          echo "gitleaks not installed — install via 'brew install gitleaks' to run locally"
        fi
      - |
        if command -v trivy >/dev/null 2>&1; then
          trivy config . --severity HIGH,CRITICAL --exit-code 1
        else
          echo "trivy not installed — install via 'brew install trivy' to run locally"
        fi

  security:fix:
    desc: "Open the SARIF reports from the latest CI run in Code Scanning"
    cmds:
      - echo "Open https://github.com/nanohype/eks-agent-platform/security/code-scanning"

  install:
    desc: Install all toolchain deps (pnpm + go mod download)
    cmds:
      - pnpm install
      - cd operators && go mod download

  # === Format ===

  fmt:
    desc: Format all files (tofu fmt + prettier + go fmt)
    cmds:
      - tofu fmt -recursive terraform/
      - pnpm format
      - cd operators && go fmt ./...

  fmt:check:
    desc: Verify formatting without modifying files
    cmds:
      - tofu fmt -check -recursive terraform/
      - pnpm format:check
      - cd operators && test -z "$(gofmt -l .)"

  # === OpenTofu ===

  tofu:validate:
    desc: Validate all OpenTofu components
    cmds:
      - |
        for d in terraform/components/*/; do
          name=$(basename "$d")
          echo "Validating components/$name..."
          (cd "$d" && tofu init -backend=false -input=false >/dev/null 2>&1 && tofu validate) || exit 1
        done
        echo "All components valid."

  tofu:plan:
    desc: "Plan a component (vars: CLUSTER, REGION, COMPONENT)"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd terraform/live/{{.CLUSTER}} && terragrunt run-all plan
        else
          cd terraform/live/{{.CLUSTER}}/{{.COMPONENT}} && terragrunt plan
        fi

  tofu:apply:
    desc: "Apply a component (vars: CLUSTER, REGION, COMPONENT)"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd terraform/live/{{.CLUSTER}} && terragrunt run-all apply
        else
          cd terraform/live/{{.CLUSTER}}/{{.COMPONENT}} && terragrunt apply
        fi

  tofu:destroy:
    desc: "Destroy a component (vars: CLUSTER, REGION, COMPONENT)"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd terraform/live/{{.CLUSTER}} && terragrunt run-all destroy
        else
          cd terraform/live/{{.CLUSTER}}/{{.COMPONENT}} && terragrunt destroy
        fi

  # === Helm ===

  helm:lint:
    desc: Lint every Helm chart in charts/
    cmds:
      - |
        for d in charts/*/; do
          name=$(basename "$d")
          echo "Linting $name..."
          helm lint "$d" || exit 1
        done

  helm:template:
    desc: Render every Helm chart to catch template errors (tenant + operator need value flags)
    cmds:
      - |
        for d in charts/*/; do
          name=$(basename "$d")
          echo "Rendering $name..."
          if [ "$name" = "tenant" ]; then
            # tenant requires platform.name + platform.tenant
            helm template "$name" "$d" --set platform.name=ci-smoke --set platform.tenant=ci-smoke >/dev/null || exit 1
          elif [ "$name" = "operator" ]; then
            # default state, then the gated eval/slo paths so the Files.Get-wrapped
            # Argo/Prometheus/Alertmanager CRs get exercised
            helm template "$name" "$d" >/dev/null || exit 1
            helm template "$name" "$d" \
              --set evalRuntime.rollouts.enabled=true --set slo.alerting.enabled=true \
              --set evalRuntime.serviceAccount.roleArn=ci-smoke-role \
              --set evalRuntime.evalReportsBucket=ci-smoke-bucket >/dev/null || exit 1
          else
            helm template "$name" "$d" >/dev/null || exit 1
          fi
        done

  # === Operator ===

  operator:gen:
    desc: Generate CRD manifests + deepcopy + RBAC from kubebuilder markers
    dir: operators
    cmds:
      - go run sigs.k8s.io/controller-tools/cmd/controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./..."
      - go run sigs.k8s.io/controller-tools/cmd/controller-gen rbac:roleName=manager-role crd paths="./..." output:crd:artifacts:config=config/crd/bases
      - mkdir -p ../charts/operator/crds && cp config/crd/bases/*.yaml ../charts/operator/crds/

  operator:build:
    desc: Build the operator binary
    dir: operators
    cmds:
      - go build -o bin/manager ./cmd

  operator:test:
    desc: Run operator unit + conformance tests via envtest
    dir: operators
    cmds:
      - make test

  operator:test:conformance:
    desc: Just the envtest conformance suite (no unit tests, no race detector)
    dir: operators
    cmds:
      - make test-conformance

  operator:image:
    desc: Build the operator container image
    dir: operators
    cmds:
      - docker build -t ghcr.io/nanohype/eks-agent-platform/operator:dev .

  # === TypeScript ===

  ts:build:
    desc: Build all TS packages
    cmds:
      - pnpm build

  ts:test:
    desc: Test all TS packages (lint + typecheck + unit)
    cmds:
      - pnpm test

  client:gen:
    desc: "Generate TS client types from CRD OpenAPI v3 schemas (script not wired yet)"
    cmds:
      - |
        echo "client:gen is not wired yet. Until scripts/gen-client.mjs exists"
        echo "(planned: run kubernetes-fluent-client or kubernetes-models-ts against"
        echo "operators/config/crd/bases/*.yaml and emit TS types into"
        echo "packages/client/src/generated/), use the hand-written types in"
        echo "packages/client/src/index.ts."
        exit 1

  # === Help ===

  help:
    desc: Show usage
    cmds:
      - |
        echo ""
        echo "Usage:"
        echo "  task <target> [CLUSTER=development-platform|staging-platform|production-platform] [REGION=us-west-2] [COMPONENT=bedrock|all]"
        echo ""
        task --list
