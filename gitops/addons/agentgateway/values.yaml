# agentgateway — base values.
#
# Deployed in HA (3 replicas) behind an ALB. ModelRoute CRs reconciled by
# eks-agent-platform-operator produce agentgateway Route/Listener resources
# that target Bedrock via the PrivateLink endpoint.

replicaCount: 3

image:
  repository: ghcr.io/agentgateway/agentgateway
  pullPolicy: IfNotPresent
  # Tag pinned by chartVersion in the ApplicationSet

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
  hosts:
    - host: agentgateway.internal
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# OpenTelemetry — endpoints set by eks-gitops OTel collector
otel:
  enabled: true
  endpoint: http://otel-collector.observability.svc.cluster.local:4317
  serviceName: agentgateway

# Network policy: only accept from app namespaces + ingress controller
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              eks-agent-platform/tenant: "true"
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: aws-load-balancer-controller

serviceAccount:
  create: true
  name: agentgateway
  # IRSA: annotated with agent-iam.operator_role_arn's downstream alias via
  # operator-managed sub-role for Bedrock InvokeModel.

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
