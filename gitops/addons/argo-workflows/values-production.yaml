controller:
  replicas: 3
  persistence:
    archive: true
    archiveTTL: 90d
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }

server:
  replicas: 2

# Production: point at an external Postgres (RDS) rather than the in-chart
# chart for archive storage. Override at install time via the
# ApplicationSet's per-cluster values overlay.
postgresql:
  enabled: false
