# argo-rollouts — base values.
#
# Consumes the eval-suite-gate AnalysisTemplate to gate canary / blue-
# green promotion on the most recent EvalSuite.status.lastScore.

controller:
  replicas: 2
  serviceAccount:
    create: true
    name: argo-rollouts
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile: { type: RuntimeDefault }
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities: { drop: ["ALL"] }
    readOnlyRootFilesystem: true

dashboard:
  enabled: true
  replicas: 1
  ingress:
    enabled: false # opt-in per-cluster; port-forward in dev
