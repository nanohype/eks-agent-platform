apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eks-agent-platform-monitoring

resources:
  - namespace.yaml
  - customresourcestatemetrics.yaml
  - prometheusrule.yaml
  - alertmanagerconfig.yaml

commonLabels:
  app.kubernetes.io/managed-by: eks-agent-platform
  app.kubernetes.io/part-of: eks-agent-platform
  app.kubernetes.io/component: operator-slo

# Pager + Slack webhook secrets MUST exist before this kustomize lands.
# The AlertmanagerConfig references them by name (pagerduty-platform,
# slack-webhook-incidents, slack-webhook-finance, slack-webhook-ops,
# slack-webhook-eng, slack-webhook-platform). Provision via your
# secret-management tool (Vault, SOPS, External Secrets Operator).
