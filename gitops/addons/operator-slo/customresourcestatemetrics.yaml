# kube-state-metrics doesn't natively emit CR-level metrics
# (kube_customresource_status_phase, kube_customresource_status_field).
# These are surfaced by the CustomResourceStateMetrics extension shipped
# in kube-state-metrics v2.7+: it reads CRs that match the configured
# GVR list and emits gauges keyed on the JSONPath you point it at.
#
# The kube-state-metrics ConfigMap below is consumed by the
# kube-state-metrics Deployment via --custom-resource-state-config-file
# (typically passed by your kube-prometheus-stack values overlay).
#
# Without this ConfigMap registered, every alert + dashboard in this
# directory that references kube_customresource_* silently emits no data
# — dashboards stay empty, alerts never fire. Cluster-onboarding TODO:
# verify kube-state-metrics is started with this file mounted.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-state-metrics-customresource-config
  namespace: eks-agent-platform-monitoring
  labels:
    app.kubernetes.io/part-of: eks-agent-platform
data:
  custom-resource-state.yaml: |
    kind: CustomResourceStateMetrics
    spec:
      resources:
        # Platform
        - groupVersionKind:
            group: agents.stxkxs.io
            version: v1alpha1
            kind: Platform
          metricNamePrefix: kube_customresource
          metrics:
            - name: status_phase
              help: "Platform.status.phase by name + phase value"
              each:
                type: StateSet
                stateSet:
                  labelName: customresource_phase
                  path: [status, phase]
                  list: [Pending, Provisioning, Ready, Suspended, Failed]
              commonLabels:
                customresource_kind: Platform
            - name: status_field
              help: "Platform.status.suspendedAt as unix ts (0 when unset)"
              each:
                type: Gauge
                gauge:
                  path: [status, suspendedAt]
                  nilIsZero: true
              commonLabels:
                customresource_kind: Platform
                field: suspendedAt

        # Tenant
        - groupVersionKind:
            group: agents.stxkxs.io
            version: v1alpha1
            kind: Tenant
          metricNamePrefix: kube_customresource
          metrics:
            - name: status_phase
              help: "Tenant.status.phase by name + phase value"
              each:
                type: StateSet
                stateSet:
                  labelName: customresource_phase
                  path: [status, phase]
                  list: [Pending, Provisioning, Active, Suspended, Failed]
              commonLabels:
                customresource_kind: Tenant
            - name: status_field
              help: "Tenant.status.{percentOfBudget,aggregateSpendUsd}"
              each:
                type: Gauge
                gauge:
                  path: [status, percentOfBudget]
              commonLabels:
                customresource_kind: Tenant
                field: percentOfBudget
            - name: condition
              help: "Tenant.status.conditions by type + status"
              each:
                type: Gauge
                gauge:
                  path: [status, conditions]
                  labelsFromPath:
                    condition_type: [type]
                    condition_status: [status]
                  valueFrom: [status]
              commonLabels:
                customresource_kind: Tenant

        # BudgetPolicy
        - groupVersionKind:
            group: agents.stxkxs.io
            version: v1alpha1
            kind: BudgetPolicy
          metricNamePrefix: kube_customresource
          metrics:
            - name: status_field
              help: "BudgetPolicy.status.{lastReconciled,killSwitchFiredAt,percentOfBudget} as gauges"
              each:
                type: Gauge
                gauge:
                  path: [status, lastReconciled]
                  nilIsZero: true
              commonLabels:
                customresource_kind: BudgetPolicy
                field: lastReconciled

        # AgentFleet
        - groupVersionKind:
            group: agents.stxkxs.io
            version: v1alpha1
            kind: AgentFleet
          metricNamePrefix: kube_customresource
          metrics:
            - name: status_phase
              help: "AgentFleet.status.phase"
              each:
                type: StateSet
                stateSet:
                  labelName: customresource_phase
                  path: [status, phase]
                  list: [Pending, Provisioning, Ready, ScaledToZero, Suspended, Failed]
              commonLabels:
                customresource_kind: AgentFleet
            - name: status_field
              help: "AgentFleet.status.readyAgents count"
              each:
                type: Gauge
                gauge:
                  path: [status, readyAgents]
              commonLabels:
                customresource_kind: AgentFleet
                field: readyAgents

        # EvalSuite
        - groupVersionKind:
            group: agents.stxkxs.io
            version: v1alpha1
            kind: EvalSuite
          metricNamePrefix: kube_customresource
          metrics:
            - name: status_phase
              help: "EvalSuite.status.phase"
              each:
                type: StateSet
                stateSet:
                  labelName: customresource_phase
                  path: [status, phase]
                  list: [Pending, Provisioning, Ready, Running, Passed, Failed]
              commonLabels:
                customresource_kind: EvalSuite
            - name: status_field
              help: "EvalSuite.status.lastScore (0..1) parsed as gauge"
              each:
                type: Gauge
                gauge:
                  path: [status, lastScore]
              commonLabels:
                customresource_kind: EvalSuite
                field: lastScore
