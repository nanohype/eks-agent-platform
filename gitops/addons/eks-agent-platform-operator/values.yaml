# eks-agent-platform operator — base values.
# Chart lives in charts/operator/ in this repo.

replicaCount: 2

image:
  repository: ghcr.io/nanohype/eks-agent-platform/operator
  pullPolicy: IfNotPresent
  # tag pinned by chartVersion

# IRSA — set by ApplicationSet from SSM /eks-agent-platform/<env>/agent-iam/operator_role_arn
serviceAccount:
  create: true
  name: operator
  annotations: {} # eks.amazonaws.com/role-arn injected per-env

leaderElection:
  enabled: true

# Per-reconciler concurrency — five separate leases under the hood.
reconcilers:
  platform:
    concurrent: 3
  gateway:
    concurrent: 3
  runtime:
    concurrent: 5
  budget:
    concurrent: 1
    requeueInterval: 1h
  eval:
    concurrent: 2

# Configuration sourced from SSM at startup
config:
  ssmPathPrefix: /eks-agent-platform
  environment: "" # set per-env values
  region: us-west-2
  killSwitch:
    eventBusName: "" # from SSM at runtime
  bedrock:
    baselineGuardrailId: "" # from SSM at runtime
  cost:
    athenaWorkgroup: ""
    athenaDatabase: ""

webhooks:
  enabled: true
  failurePolicy: Fail
  port: 9443

metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

networkPolicy:
  enabled: true
