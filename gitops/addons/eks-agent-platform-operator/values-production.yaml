replicaCount: 3

leaderElection:
  enabled: true

config:
  environment: production
  region: us-west-2
  oidc:
    providerArn: ""
    issuerHost: ""

reconcilers:
  platform:
    concurrent: 5
  gateway:
    concurrent: 5
  runtime:
    concurrent: 10
  budget:
    concurrent: 2
    requeueInterval: 1h
  eval:
    concurrent: 4

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

priorityClassName: system-cluster-critical

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceAccount:
  annotations: {}
