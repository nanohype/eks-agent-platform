apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eval-runner

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - workflow-template.yaml
  - analysis-template.yaml

commonLabels:
  app.kubernetes.io/managed-by: eks-agent-platform
  app.kubernetes.io/part-of: eks-agent-platform
  app.kubernetes.io/component: eval-runtime

# The IRSA annotation on serviceaccount.yaml resolves to
# terraform/components/eval-runtime's eval_runner_role_arn output. ArgoCD
# ApplicationSet patches the value per-environment via the elements list
# in gitops/applicationsets/kustomize-only.yaml.
