# Argo Workflow pods need:
#   - read EvalSuite + AgentFleet across tenant namespaces (to fetch the
#     suite they're running for + the fleet they're targeting),
#   - update EvalSuite.status (writeback of lastScore + lastRunAt + phase),
#   - read/list pods + emit events (Workflow controller-side helpers).
#
# Tenant access is read-only on the agents.stxkxs.io API group. Writes are
# scoped to the EvalSuite status subresource.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eval-runner
rules:
  - apiGroups: ["agents.stxkxs.io"]
    resources: ["evalsuites", "agentfleets", "platforms", "modelgateways"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agents.stxkxs.io"]
    resources: ["evalsuites/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtaskresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eval-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eval-runner
subjects:
  - kind: ServiceAccount
    name: eval-runner
    namespace: eval-runner
