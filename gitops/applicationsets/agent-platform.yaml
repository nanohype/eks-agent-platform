apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: agent-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
                  eks-agent-platform/enabled: "true"
          - list:
              elements:
                - appName: gpu-operator
                  namespace: gpu-operator
                  chartRepo: https://helm.ngc.nvidia.com/nvidia
                  chart: gpu-operator
                  chartVersion: v26.3.1
                  path: addons/gpu-operator
                  syncWave: "10"
                # aws-neuron-device-plugin ships as pure-YAML manifests;
                # it lives in kustomize-only.yaml (this matrix is Helm-only).
                - appName: nvidia-dra-driver
                  namespace: nvidia-dra-driver
                  chartRepo: oci://nvcr.io/nvidia/k8s
                  chart: k8s-dra-driver-gpu
                  chartVersion: "25.8.0"
                  path: addons/dra-driver
                  syncWave: "11"
                - appName: agentgateway
                  namespace: agentgateway
                  chartRepo: oci://ghcr.io/agentgateway/agentgateway/charts
                  chart: agentgateway
                  chartVersion: "1.0.1"
                  path: addons/agentgateway
                  syncWave: "20"
                - appName: eks-agent-platform-operator
                  namespace: eks-agent-platform
                  chartRepo: oci://ghcr.io/nanohype/eks-agent-platform/charts
                  chart: operator
                  chartVersion: "0.1.0"
                  path: addons/eks-agent-platform-operator
                  syncWave: "21"
                - appName: kagent
                  namespace: kagent
                  chartRepo: oci://ghcr.io/kagent-dev/kagent/helm
                  chart: kagent
                  chartVersion: "0.9.4"
                  path: addons/kagent
                  syncWave: "30"
                # Argo Workflows — runtime for EvalSuite. The eval-runner
                # WorkflowTemplate + AnalysisTemplate ship via the
                # kustomize-only ApplicationSet (see kustomize-only.yaml).
                - appName: argo-workflows
                  namespace: argo
                  chartRepo: https://argoproj.github.io/argo-helm
                  chart: argo-workflows
                  chartVersion: "0.45.3"
                  path: addons/argo-workflows
                  syncWave: "25"
                # Argo Rollouts — consumes EvalSuite.status.lastScore via
                # the eval-suite-gate AnalysisTemplate. Optional for
                # tenants that don't use canary/blue-green promotion.
                - appName: argo-rollouts
                  namespace: argo-rollouts
                  chartRepo: https://argoproj.github.io/argo-helm
                  chart: argo-rollouts
                  chartVersion: "2.40.0"
                  path: addons/argo-rollouts
                  syncWave: "26"
  template:
    metadata:
      # Cluster-prefixed so an ArgoCD hub managing multiple clusters can host
      # the same addon set on each cluster without Application name collisions.
      name: '{{ index .metadata.labels "cluster_name" }}-{{ .appName }}'
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    spec:
      project: eks-agent-platform
      sources:
        - repoURL: "{{ .chartRepo }}"
          chart: "{{ .chart }}"
          targetRevision: "{{ .chartVersion }}"
          helm:
            releaseName: "{{ .appName }}"
            parameters:
              - name: clusterName
                value: '{{ index .metadata.labels "cluster_name" }}'
              - name: region
                value: '{{ index .metadata.labels "region" }}'
            valueFiles:
              - $values/{{ .path }}/values.yaml
              - $values/{{ .path }}/values-{{ index .metadata.labels "environment" }}.yaml
        - repoURL: https://github.com/nanohype/eks-agent-platform.git
          targetRevision: main
          ref: values
      destination:
        server: "{{ .server }}"
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
