# Cluster secret label envelope read by ApplicationSet matrix generators.
# Apply this once per cluster Argo registers.
apiVersion: v1
kind: Secret
metadata:
  name: in-cluster-dev
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    eks-agent-platform/enabled: "true"
    cluster_name: eks-dev
    region: us-west-2
    environment: dev
type: Opaque
stringData:
  name: in-cluster
  server: https://kubernetes.default.svc
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
