apiVersion: v1
kind: Secret
metadata:
  name: in-cluster-staging
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    eks-agent-platform/enabled: "true"
    cluster_name: eks-staging
    region: us-west-2
    environment: staging
type: Opaque
stringData:
  name: in-cluster
  server: https://kubernetes.default.svc
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
