version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - misspell
    - revive
    - bodyclose
    - dupl
    - goconst
    - prealloc
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G104 # Errors unhandled (errcheck covers this)
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-strings
        - name: error-return
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: zz_generated\.deepcopy\.go
        linters: [revive, unused, dupl]
      - path: _test\.go
        linters: [dupl, gosec, errcheck]
      # The per-CRD *_controller.go files share the same structural scaffold by
      # design — SetupWithManager wiring, finalizer add/remove, the phase-handling
      # switch, and the requeue/status-write boilerplate are deliberately uniform
      # across reconcilers so the set reads consistently. dupl flags that shared
      # skeleton as duplication; it is intentional, so exclude these files (the
      # substantive reconcile bodies live in the *_reconcile.go files, which dupl
      # still checks).
      - path: internal/controller/.*_controller\.go
        linters: [dupl]

formatters:
  enable:
    - gofmt
    - goimports
