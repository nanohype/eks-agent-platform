---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: agentfleets.agents.nanohype.dev
spec:
  group: agents.nanohype.dev
  names:
    kind: AgentFleet
    listKind: AgentFleetList
    plural: agentfleets
    shortNames:
    - fleet
    singular: agentfleet
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.platformRef.name
      name: Platform
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.readyAgents
      name: Ready
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentFleet is a Platform-scoped composition of one or more agents on top
          of upstream kagent CRs. The scale subresource is deliberately omitted:
          `kubectl scale` would be ambiguous (min? max? per-agent?) for a fleet,
          so per-agent replica overrides live on AgentSpec.Replicas and fleet-wide
          behavior is driven by .spec.scaling (KEDA) instead.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AgentFleetSpec composes kagent Agent / ModelConfig / ToolServer CRs plus
              platform-specific scaffolding (KEDA, NetworkPolicy, IRSA binding).
            properties:
              agents:
                description: Agents is the list of agents to provision in this fleet.
                items:
                  description: AgentSpec is one agent in the fleet.
                  properties:
                    modelRoute:
                      description: ModelRoute is the named route on the Platform's
                        ModelGateway.
                      type: string
                    name:
                      type: string
                    replicas:
                      description: Replicas overrides the fleet-wide scaling minimum
                        for this agent.
                      format: int32
                      type: integer
                    systemPrompt:
                      description: SystemPrompt is the agent's instruction text.
                      type: string
                    tools:
                      description: Tools is the list of kagent ToolServer references.
                      items:
                        description: ToolRef references a kagent ToolServer by name.
                        properties:
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                  required:
                  - modelRoute
                  - name
                  - systemPrompt
                  type: object
                minItems: 1
                type: array
              platformRef:
                description: LocalRef references a CR by name in the same namespace.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              scaling:
                description: Scaling controls KEDA's ScaledObject for the runtime
                  Deployments.
                properties:
                  enabled:
                    default: true
                    description: |-
                      Enabled — when false, the operator scales the Deployment to 0 and
                      removes the ScaledObject. Toggled false by the kill-switch on budget
                      breach.
                    type: boolean
                  max:
                    default: 10
                    description: Max replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  min:
                    default: 1
                    description: |-
                      Min replicas. Use a pointer so 0 (kill-switch state) is distinguishable
                      from "field absent" — with int32 + omitempty, the zero value gets
                      dropped and re-defaulted, making min=0 unrepresentable.
                    format: int32
                    minimum: 0
                    type: integer
                  queueDepthTrigger:
                    default: 10
                    description: 'QueueDepthTrigger: scale up when SQS depth exceeds
                      this value.'
                    format: int32
                    minimum: 1
                    type: integer
                  queueUrl:
                    description: |-
                      QueueUrl is the SQS queue the fleet's work originates from. When
                      set the operator emits a KEDA aws-sqs-queue trigger; otherwise a
                      CPU-utilization placeholder. The tenant IRSA role must have
                      sqs:GetQueueAttributes on this queue (granted via the agent-iam
                      baseline policy + an in-policy resource ARN derived from the URL).
                    pattern: ^https://sqs\.[a-z0-9-]+\.amazonaws\.com/[0-9]{12}/[A-Za-z0-9_-]+(\.fifo)?$
                    type: string
                required:
                - enabled
                type: object
            required:
            - agents
            - platformRef
            type: object
          status:
            description: AgentFleetStatus reports rollout state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the last spec.generation reconciled.
                format: int64
                type: integer
              phase:
                description: 'Phase: Pending, Provisioning, Ready, ScaledToZero, Failed.'
                type: string
              readyAgents:
                description: ReadyAgents counts agents whose downstream Deployment
                  is ready.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
